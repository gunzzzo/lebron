<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>hello</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>

<body>

<iframe
  id="siteFrame"
  src="https://lebronjames.com"
  allowfullscreen>
</iframe>

<script>
const frame = document.getElementById("siteFrame");

document.addEventListener("click", () => {
  frame.focus();
});

window.addEventListener("keydown", (e) => {

  // Example fullscreen shortcut
  if (e.key === "F11") {
    e.preventDefault();

    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }

  // Forward focus to iframe
  frame.focus();
});
</script>

</body>
</html>
